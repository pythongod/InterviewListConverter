name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Check for linting issues (optional)
      run: |
        if [ -f "package.json" ] && grep -q "lint" package.json; then
          npm run lint
        else
          echo "No linting script found, skipping lint check"
        fi
      continue-on-error: true

    - name: Build CSS (if needed)
      run: |
        if [ -f "package.json" ] && grep -q "build:css" package.json; then
          npm run build:css
        else
          echo "No CSS build script found, skipping CSS build"
        fi
      continue-on-error: true

    - name: Test artifact creation
      run: |
        # Create a simple test to ensure core files exist
        test -f "script.js" || exit 1
        test -f "index.html" || exit 1
        test -f "package.json" || exit 1
        echo "✅ All core files present"

  test-multiple-node-versions:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test 